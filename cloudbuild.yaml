steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/chartink-webhook:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/chartink-webhook:latest
      - ./app

  # 2. Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/chartink-webhook']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - chartink-webhook
      - --image=gcr.io/$PROJECT_ID/chartink-webhook:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=2Gi
      - --cpu=1
      - --concurrency=10
      - --timeout=300
      - --min-instances=0
      - --max-instances=3
      - --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,USE_SECRET_MANAGER=true
      - --service-account=chartink-webhook-sa@$PROJECT_ID.iam.gserviceaccount.com

images:
  - gcr.io/$PROJECT_ID/chartink-webhook:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/chartink-webhook:latest

options:
  logging: CLOUD_LOGGING_ONLY
